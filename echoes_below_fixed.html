<script>
(() => {
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
const W=480,H=320,TILE=16,MAP_W=30,MAP_H=20,FIELD_H=272,SAVE_KEY='echoes_below_save_v1';
const keys=Object.create(null),pressed=Object.create(null);let lastTime=performance.now(),globalTime=0,musicTimer=null,musicArea='',musicStep=0,audioStarted=false;
const colors={ink:'#fff7dc',panel:'#171225',accent:'#89ffe4',danger:'#ff5d73',gold:'#ffd66b',muted:'#b8abc9'};
const items={crumb_cookie:{name:'Crumb Cookie',heal:6,desc:'A cookie that remembers being whole. Heals 6 HP.'},dew_tea:{name:'Dew Tea',heal:10,desc:'Glowing tea brewed from silent leaves. Heals 10 HP.'},brass_apple:{name:'Brass Apple',heal:14,desc:'Crunches like a tiny bell. Heals 14 HP.'},glass_pear:{name:'Glass Pear',heal:18,desc:'Somehow soft inside. Heals 18 HP.'},paper_moon:{name:'Paper Moon',heal:22,desc:'A folded moon that unfolds in your chest. Heals 22 HP.'}};
const state={screen:'title',area:'garden',px:3*TILE+4,py:14*TILE,dir:'down',hp:24,maxHp:24,inventory:{crumb_cookie:2,dew_tea:1},flags:{},journal:[],memories:[],kills:0,majorKills:0,spares:0,friendship:{mira:0,pip:0,kestrel:0,serel:0},steps:0,encounterGrace:0,menuIndex:0,submenuIndex:0,toast:null,endingSeen:null,runtime:0};
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function rand(a,b){return Math.random()*(b-a)+a}function irand(a,b){return Math.floor(rand(a,b+1))}function choice(a){return a[Math.floor(Math.random()*a.length)]}function clone(o){return JSON.parse(JSON.stringify(o))}function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function flag(n){return!!state.flags[n]}function setFlag(n,v=true){state.flags[n]=v}function routeName(){if(state.kills>=8||state.majorKills>=2)return'violent';if(state.kills===0)return'mercy';return'neutral'}function toast(t){state.toast={text:t,t:130}}function heal(n){state.hp=clamp(state.hp+n,0,state.maxHp)}function removeItem(id,n=1){state.inventory[id]=Math.max(0,(state.inventory[id]||0)-n);if(state.inventory[id]<=0)delete state.inventory[id]}function addItem(id,n=1){state.inventory[id]=(state.inventory[id]||0)+n;toast('Got '+items[id].name+' x'+n)}
function addJournal(id,title,body){if(!state.journal.some(j=>j.id===id)){state.journal.push({id,title,body});toast('Journal updated: '+title)}}function addMemory(id,name){if(!state.memories.includes(id)){state.memories.push(id);addJournal('memory_'+id,'Memory: '+name,'A small glowing recollection settled into your pocket. It feels warmer when you choose not to hurt anyone.')}}
function saveGame(){state.hp=state.maxHp;localStorage.setItem(SAVE_KEY,JSON.stringify({area:state.area,px:state.px,py:state.py,dir:state.dir,hp:state.hp,maxHp:state.maxHp,inventory:state.inventory,flags:state.flags,journal:state.journal,memories:state.memories,kills:state.kills,majorKills:state.majorKills,spares:state.spares,friendship:state.friendship,runtime:state.runtime}));toast('Your echo has been saved.');sfx('save')}function loadGame(){const raw=localStorage.getItem(SAVE_KEY);if(!raw)return false;try{Object.assign(state,JSON.parse(raw));state.screen='field';state.encounterGrace=120;startMusic(state.area);toast('Loaded your last echo.');return true}catch(e){console.warn(e);return false}}
function newGame(){Object.assign(state,{screen:'field',area:'garden',px:3*TILE+4,py:14*TILE,dir:'down',hp:24,maxHp:24,inventory:{crumb_cookie:2,dew_tea:1},flags:{},journal:[],memories:[],kills:0,majorKills:0,spares:0,friendship:{mira:0,pip:0,kestrel:0,serel:0},steps:0,encounterGrace:180,menuIndex:0,submenuIndex:0,toast:null,endingSeen:null,runtime:0});addJournal('first_fall','The First Fall','You found a hidden stair beneath a rain gutter and woke under a sky made of roots. Someone has been keeping this place secret.');rebuildMaps();startMusic('garden');openDialogue([{name:'Narration',face:'player',text:'Rain chased you into an abandoned subway mouth. The last stair was not there.'},{name:'Narration',face:'player',text:'You fell through warm darkness, past glowing roots, old bells, and a voice that whispered: please remember us.'},{name:'???',face:'mira',text:'Oh. A surface child. Breathe slowly. The Garden dislikes panic. It waters it.'},{name:'Mira',face:'mira',text:'My name is Mira. I can guide you to the Heart Core... if the world still lets me.'}],'field')}
function makeTiles(){const r=[];for(let y=0;y<MAP_H;y++){let row='';for(let x=0;x<MAP_W;x++)row+=(x===0||y===0||x===MAP_W-1||y===MAP_H-1)?'#':'.';r.push(row.split(''))}return r}function paint(r,x,y,w,h,ch){for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)if(r[yy]&&r[yy][xx]!==undefined)r[yy][xx]=ch}
function makeMap(id){const t=makeTiles();if(id==='garden'){paint(t,4,4,5,2,'#');paint(t,13,3,2,8,'#');paint(t,20,6,6,2,'#');paint(t,2,9,5,1,'~');paint(t,8,14,8,1,'*');paint(t,23,13,2,4,'#');paint(t,1,2,1,2,'.');paint(t,28,9,1,3,'.')}if(id==='clock'){paint(t,5,3,2,11,'#');paint(t,12,5,10,1,'#');paint(t,15,9,1,8,'#');paint(t,21,11,6,1,'~');paint(t,8,15,5,1,'*');paint(t,1,9,1,3,'.');paint(t,28,8,1,5,'.');if(!flag('clock_gate_open'))paint(t,27,8,2,4,'#')}if(id==='village'){paint(t,3,3,4,4,'h');paint(t,11,4,5,4,'h');paint(t,21,3,4,5,'h');paint(t,5,13,8,1,'*');paint(t,16,13,9,1,'*');paint(t,1,8,3,2,'.');paint(t,28,8,1,3,'.')}if(id==='library'){paint(t,3,3,6,2,'b');paint(t,12,3,6,2,'b');paint(t,21,3,6,2,'b');paint(t,3,8,6,2,'b');paint(t,12,8,6,2,'b');paint(t,21,8,6,2,'b');paint(t,10,13,10,1,'*');paint(t,14,14,2,4,'#');paint(t,1,9,1,3,'.');paint(t,28,9,1,3,'.')}if(id==='heart'){paint(t,6,4,18,1,'*');paint(t,6,14,18,1,'*');paint(t,5,5,1,9,'*');paint(t,24,5,1,9,'*');paint(t,11,7,8,5,'~');paint(t,14,9,2,1,'.');paint(t,1,9,1,3,'.')}if(id==='secret'){paint(t,3,3,24,2,'*');paint(t,5,8,20,1,'~');paint(t,11,12,8,1,'*');paint(t,28,15,1,4,'.')}return t}
const areaDefs={garden:{name:'The Forgotten Garden',floor:'#142518',wall:'#2c4b33',accent:'#76f2a5',water:'#225166',danger:'#354e24',encounters:['petalune','mossling'],warps:[{x:28,y:9,w:1,h:3,to:'clock',px:1*TILE+4,py:10*TILE},{x:1,y:2,w:1,h:2,to:'secret',px:27*TILE,py:16*TILE,need:'garden_secret_open'}]},clock:{name:'The Clockwork Depths',floor:'#171821',wall:'#463821',accent:'#ffd66b',water:'#2a3048',danger:'#393226',encounters:['tinmouse','gearling'],warps:[{x:1,y:9,w:1,h:3,to:'garden',px:27*TILE,py:10*TILE},{x:28,y:8,w:1,h:5,to:'village',px:1*TILE+4,py:9*TILE,need:'clock_gate_open'}]},village:{name:'The Glass Village',floor:'#17202c',wall:'#4e78a0',accent:'#a9f9ff',water:'#2e4f65',danger:'#433b52',encounters:[],warps:[{x:1,y:8,w:1,h:3,to:'clock',px:27*TILE,py:10*TILE},{x:28,y:8,w:1,h:3,to:'library',px:1*TILE+4,py:10*TILE,need:'kestrel_pass'}]},library:{name:'The Ashen Library',floor:'#22181a',wall:'#513132',accent:'#ff9e7a',water:'#3a2228',danger:'#332229',encounters:['bookwisp','marginimp'],warps:[{x:1,y:9,w:1,h:3,to:'village',px:27*TILE,py:9*TILE},{x:28,y:9,w:1,h:3,to:'heart',px:1*TILE+4,py:10*TILE,need:'library_boss_done'}]},heart:{name:'The Heart Core',floor:'#11111f',wall:'#43355f',accent:'#ff81b5',water:'#291a3f',danger:'#45223b',encounters:[],warps:[{x:1,y:9,w:1,h:3,to:'library',px:27*TILE,py:10*TILE}]},secret:{name:'The Room That Remembers',floor:'#1a1430',wall:'#624a8f',accent:'#fff0a6',water:'#3b2760',danger:'#261b40',encounters:[],warps:[{x:28,y:15,w:1,h:4,to:'garden',px:2*TILE,py:3*TILE}]}};let maps={};function rebuildMaps(){maps={};Object.keys(areaDefs).forEach(id=>maps[id]=makeMap(id))}rebuildMaps();
const npcs=[{id:'mira',area:'garden',x:5,y:13,face:'mira',color:'#86ffda',name:'Mira'},{id:'pip_garden',area:'garden',x:11,y:12,face:'pip',color:'#ffd66b',name:'Pip'},{id:'clocksmith',area:'clock',x:10,y:3,face:'robot',color:'#d7ae55',name:'Tick-Tallow'},{id:'pip_clock',area:'clock',x:19,y:14,face:'pip',color:'#ffd66b',name:'Pip'},{id:'kestrel',area:'village',x:16,y:10,face:'kestrel',color:'#a9f9ff',name:'Kestrel'},{id:'crystal_poet',area:'village',x:8,y:9,face:'glass',color:'#7cc8ff',name:'Luma'},{id:'serel',area:'village',x:23,y:10,face:'serel',color:'#dbf7ff',name:'Serel'},{id:'ashkeeper',area:'library',x:6,y:13,face:'book',color:'#ff9e7a',name:'Aural'},{id:'valis_shadow',area:'heart',x:15,y:7,face:'valis',color:'#ff81b5',name:'Valis'},{id:'memorychild',area:'secret',x:14,y:10,face:'player',color:'#fff0a6',name:'Small Echo'}];
const objects=[{id:'save_garden',area:'garden',x:3,y:15,type:'save'},{id:'save_clock',area:'clock',x:3,y:16,type:'save'},{id:'save_village',area:'village',x:14,y:13,type:'save'},{id:'save_library',area:'library',x:25,y:14,type:'save'},{id:'save_heart',area:'heart',x:15,y:15,type:'save'},{id:'garden_chest',area:'garden',x:24,y:12,type:'chest',item:'dew_tea'},{id:'secret_chest',area:'secret',x:15,y:13,type:'chest',item:'paper_moon'},{id:'garden_statue',area:'garden',x:2,y:2,type:'lore',journal:['statue_garden','The Weeping Statue','The statue has no face. Its plaque says: “No one is lost while someone chooses to look.” A hidden root shifts nearby.'],flag:'garden_secret_open'},{id:'switch_a',area:'clock',x:9,y:7,type:'switch'},{id:'switch_b',area:'clock',x:24,y:15,type:'switch'},{id:'library_page_1',area:'library',x:4,y:6,type:'memory',memory:['leaf','A Leaf From Above']},{id:'library_page_2',area:'library',x:24,y:6,type:'memory',memory:['letter','A Letter Never Sent']},{id:'library_boss_trigger',area:'library',x:27,y:10,type:'boss',enemy:'bookwisp_boss',flag:'library_boss_done'},{id:'heart_final_trigger',area:'heart',x:15,y:8,type:'final',flag:'final_done'}];
const faces={player:{c:'#fff7dc',eye:'#181324',hair:'#4f3e5e'},mira:{c:'#86ffda',eye:'#1b4755',hair:'#1d3141'},pip:{c:'#ffd66b',eye:'#5d3b19',hair:'#b85935'},kestrel:{c:'#a9f9ff',eye:'#243e74',hair:'#41556a'},glass:{c:'#7cc8ff',eye:'#defdff',hair:'#315a80'},serel:{c:'#dbf7ff',eye:'#8ac7ff',hair:'#688dac'},robot:{c:'#d7ae55',eye:'#fff0a6',hair:'#594321'},book:{c:'#ff9e7a',eye:'#5a1e22',hair:'#4c2525'},valis:{c:'#ff81b5',eye:'#fff7dc',hair:'#572c4d'}};
let dialogue=null,pendingChoice=null,titleIndex=localStorage.getItem(SAVE_KEY)?1:0,menuMode='main',journalIndex=0,battle=null;const titleOptions=['Begin','Continue','Controls'];
function openDialogue(lines,returnScreen='field',onDone=null){dialogue={lines,i:0,char:0,returnScreen,onDone};state.screen='dialogue';sfx('talk')}function currentLine(){return dialogue&&dialogue.lines[dialogue.i]}function advanceDialogue(){if(!dialogue)return;const line=currentLine();if(dialogue.char<line.text.length){dialogue.char=line.text.length;return}dialogue.i++;dialogue.char=0;if(dialogue.i>=dialogue.lines.length){const done=dialogue.onDone,ret=dialogue.returnScreen;dialogue=null;if(done)done();if(state.screen==='dialogue')state.screen=ret}else sfx('talk')}function openChoice(prompt,options,onPick){pendingChoice={prompt,options,index:0,onPick};state.screen='choice'}
function npcDialogue(n){const r=routeName();if(n.id==='mira'){if(r==='violent')return[{name:'Mira',face:'mira',text:'The petals stopped glowing when you passed. They are afraid to be beautiful near you.'},{name:'Mira',face:'mira',text:'I once made a terrible choice because I thought fear was wisdom. Please do not make a home in it.'}];if(!flag('mira_intro_done'))return[{name:'Mira',face:'mira',text:'This place is called the Below. It was built from the wishes people buried because they were too heavy to carry.'},{name:'Mira',face:'mira',text:'I used to guard the stair upward. Then I closed it. I told myself it was mercy.'},{name:'Mira',face:'mira',text:'If you meet frightened things, listen first. Most claws are just loneliness wearing gloves.'}];return[{name:'Mira',face:'mira',text:'The Core remembers every choice. Not as judgment. As music.'},{name:'Mira',face:'mira',text:state.kills===0?'So far, your melody is gentle. Keep it difficult. Gentle is rarely easy.':'Your melody has sharp notes now. That does not mean the song is over.'}]}if(n.id==='pip_garden'||n.id==='pip_clock'){if(r==='violent')return[{name:'Pip',face:'pip',text:'Ha ha! Classic joke: a traveler walks into a room and everyone gets quiet.'},{name:'Pip',face:'pip',text:'That one was not funny. I am learning when not to laugh.'}];if(!flag('pip_met'))return[{name:'Pip',face:'pip',text:'HALT! I am Pip, licensed hero, unlicensed baker, banned from four soup contests.'},{name:'Pip',face:'pip',text:'Mira says not to bother you, so I will bother you supportively.'},{name:'Pip',face:'pip',text:'Take this emergency snack. It is mostly crumbs and encouragement.'}];return[{name:'Pip',face:'pip',text:'When I get scared, I tell jokes. When jokes get scared, they tell me.'},{name:'Pip',face:'pip',text:'Stick around, okay? Nobody should be the punchline of being alone.'}]}if(n.id==='clocksmith')return[{name:'Tick-Tallow',face:'robot',text:'The gate opens when both promise-levers face awake. Do not ask why machines need promises.'},{name:'Tick-Tallow',face:'robot',text:'We were made to count seconds until the surface remembered us. We have become extremely good at disappointment.'}];if(n.id==='kestrel'){if(!flag('kestrel_pass'))return[{name:'Kestrel',face:'kestrel',text:'Surface traveler. Your kind makes windows and then throws stones at them.'},{name:'Kestrel',face:'kestrel',text:'The library road is closed. Prove you are not just another ending with shoes.'}];return r==='violent'?[{name:'Kestrel',face:'kestrel',text:'I was wrong. You are not an ending with shoes. You are an ending that learned to run.'}]:[{name:'Kestrel',face:'kestrel',text:'I still distrust you. I am trying to do it politely.'},{name:'Kestrel',face:'kestrel',text:'Serel says courage can be quiet. I hate when gentle people are right.'}]}if(n.id==='crystal_poet')return[{name:'Luma',face:'glass',text:'We are glass because the world wanted us honest. Every crack is a sentence.'},{name:'Luma',face:'glass',text:state.kills===0?'You walk softly. The floor has started humming back.':'You carry silence behind you. It has footprints.'}];if(n.id==='serel')return[{name:'Serel',face:'serel',text:'I am Serel, keeper of a village that breaks when frightened.'},{name:'Serel',face:'serel',text:'I do not want to fight you. But protection and fear are cousins, and families are complicated.'}];if(n.id==='ashkeeper')return[{name:'Aural',face:'book',text:'This library burned without fire. People forgot us loudly enough that paper turned to ash.'},{name:'Aural',face:'book',text:'If a book spirit attacks, read between the hurts.'}];if(n.id==='valis_shadow')return[{name:'Valis',face:'valis',text:'The Core is not a machine. It is a heart forced to be useful.'},{name:'Valis',face:'valis',text:'Come closer when you are ready to learn what Mira locked away.'}];if(n.id==='memorychild')return[{name:'Small Echo',face:'player',text:'I am the part of someone that waited too long to be apologized to.'},{name:'Small Echo',face:'player',text:'Take this memory. It is small enough to carry, but not small enough to ignore.'}];return[{name:n.name,face:n.face,text:'...'}]}
function interactNPC(n){if(n.id==='pip_garden'&&!flag('pip_met'))openDialogue(npcDialogue(n),'field',()=>{setFlag('pip_met');state.friendship.pip++;addItem('crumb_cookie',1)});else if(n.id==='mira'&&!flag('mira_intro_done'))openDialogue(npcDialogue(n),'field',()=>{setFlag('mira_intro_done');state.friendship.mira++});else if(n.id==='kestrel'&&!flag('kestrel_pass'))openDialogue(npcDialogue(n),'field',()=>openChoice('Kestrel watches your hands, not your face.',[{text:'Show empty hands',result:'kind'},{text:'Tell a nervous joke',result:'pip'},{text:'Push past them',result:'rude'}],o=>{if(o.result==='kind'){state.friendship.kestrel+=2;setFlag('kestrel_pass');openDialogue([{name:'Kestrel',face:'kestrel',text:'...Fine. The road opens. Do not make me regret trusting a pair of empty hands.'}],'field')}else if(o.result==='pip'){state.friendship.kestrel++;setFlag('kestrel_pass');openDialogue([{name:'Kestrel',face:'kestrel',text:'That joke was terrible. I respect the bravery required to say it aloud. Pass.'}],'field')}else{setFlag('kestrel_pass');state.friendship.kestrel--;openDialogue([{name:'Kestrel',face:'kestrel',text:'There it is. The surface habit. Go, then. The library has sharper teeth than I do.'}],'field')}}));else if(n.id==='memorychild'&&!flag('secret_memory_taken'))openDialogue(npcDialogue(n),'field',()=>{setFlag('secret_memory_taken');addMemory('echo','An Apology Waiting')});else openDialogue(npcDialogue(n),'field')}
function interactObject(o){if(o.type==='save')openDialogue([{name:'Save Bell',face:'mira',text:'A tiny bell rings in your chest. For a moment, even your mistakes stand still.'}],'field',saveGame);else if(o.type==='chest'){if(flag(o.id+'_open'))openDialogue([{name:'Chest',face:'robot',text:'The chest is empty. It looks proud of its minimalism.'}],'field');else openDialogue([{name:'Chest',face:'robot',text:'You open the little chest. It sighs like it was holding its breath.'}],'field',()=>{setFlag(o.id+'_open');addItem(o.item,1)})}else if(o.type==='lore')openDialogue([{name:'Stone Plaque',face:'mira',text:o.journal[2]}],'field',()=>{addJournal(o.journal[0],o.journal[1],o.journal[2]);setFlag(o.flag);rebuildMaps()});else if(o.type==='switch'){setFlag(o.id,!flag(o.id));if(flag('switch_a')&&flag('switch_b')&&!flag('clock_gate_open')){setFlag('clock_gate_open');rebuildMaps();openDialogue([{name:'Clockwork Gate',face:'robot',text:'Both levers click awake. Somewhere, a gate remembers how to open.'}],'field')}else openDialogue([{name:'Lever',face:'robot',text:flag(o.id)?'The lever points to AWAKE.':'The lever points to ASLEEP.'}],'field')}else if(o.type==='memory'){if(flag(o.id+'_taken'))openDialogue([{name:'Ash',face:'book',text:'Only a warm outline remains.'}],'field');else openDialogue([{name:'Lost Page',face:'book',text:'A loose page flutters into your hand before it can become ash.'}],'field',()=>{setFlag(o.id+'_taken');addMemory(o.memory[0],o.memory[1])})}else if(o.type==='boss'){if(flag(o.flag))openDialogue([{name:'Quiet Shelf',face:'book',text:'The books shift to make a road. None of them bite.'}],'field');else startBattle(o.enemy,true)}else if(o.type==='final'){if(!flag(o.flag))startBattle(routeName()==='violent'?'valis_violent':routeName()==='mercy'?'valis_mercy':'valis_neutral',true)}}
const enemies={petalune:{name:'Petalune',face:'flower',maxHp:18,atk:4,pattern:'petals',intro:'A lonely flower creature blooms in your path, pretending it was not waiting for someone.',actLines:{observe:'Petalune keeps leaning toward your shadow. It wants company but fears being picked.',joke:'You say flowers are great at putting down roots. Petalune groans, then smiles with all six petals.',kind:'You tell Petalune it can be seen without being taken. Its thorns soften.'},spareAt:2,mercyText:'Petalune is swaying peacefully.',killText:'Petalune loses its color before it falls.'},mossling:{name:'Mossling',face:'moss',maxHp:14,atk:3,pattern:'drips',intro:'A Mossling rolls out of a puddle and tries to look ancient.',actLines:{observe:'Mossling is actually three smaller mosslings in a cloak of wet leaves.',joke:'You ask if it is lichen the conversation. The cloak wiggles with forbidden laughter.',kind:'You compliment its very official sogginess. It stands taller.'},spareAt:2,mercyText:'Mossling salutes with a leaf.',killText:'The cloak collapses into scared green scraps.'},tinmouse:{name:'Nervous Tinmouse',face:'mouse',maxHp:22,atk:5,pattern:'gears',intro:'A clockwork mouse winds itself too tightly and squeaks in twelve directions.',actLines:{observe:'Its key is spinning faster than its courage. A calm rhythm might help.',joke:'You ask what time mice eat cheese. Tinmouse whispers, “constantly?” It relaxes.',kind:'You breathe in time with its ticking. Tick. Tock. Tick. Tock. It steadies.'},spareAt:3,mercyText:'Tinmouse ticks at a safe volume.',killText:'Its key turns once more, searching for a reason.'},gearling:{name:'Gearling',face:'gear',maxHp:24,atk:5,pattern:'gears',intro:'A gear with tiny boots blocks the way, rotating with professional suspicion.',actLines:{observe:'Gearling’s teeth are chipped from trying to fit where it does not belong.',joke:'You say it is really turning its life around. It tries not to laugh and rotates anyway.',kind:'You tell Gearling that not fitting can be proof it was made for a different machine.'},spareAt:3,mercyText:'Gearling spins beside you instead of against you.',killText:'The gear stops where no machine can reach it.'},bookwisp:{name:'Book Wisp',face:'book',maxHp:26,atk:6,pattern:'letters',intro:'A burned book spirit snaps open. Its pages are full of unfinished goodbyes.',actLines:{observe:'Every sentence ends before the important word. It is afraid of being closed again.',joke:'You ask if it has a good spine. The wisp slams itself shut in embarrassment.',kind:'You read one broken line aloud and do not fix it. The wisp trembles.'},spareAt:3,mercyText:'Book Wisp bookmarks a page called “maybe.”',killText:'The pages scatter before they can finish your name.'},marginimp:{name:'Margin Imp',face:'imp',maxHp:20,atk:5,pattern:'letters',intro:'A doodle in the margin peels itself free and makes a rude little bow.',actLines:{observe:'Margin Imp was drawn next to a sad paragraph to make someone laugh.',joke:'You perform a tiny bow back. It declares this legally comedy.',kind:'You tell it even scribbles can save a page.'},spareAt:2,mercyText:'Margin Imp doodles a door and leaves through it.',killText:'The imp becomes ink again, but not a picture.'},bookwisp_boss:{name:'Aural, the Unread',face:'book',maxHp:48,atk:7,pattern:'bossletters',boss:true,major:true,intro:'The burned shelves gather into Aural, a guardian made of every book no one came back for.',actLines:{observe:'Aural is not guarding knowledge. Aural is guarding grief from becoming useless.',joke:'You whisper that this fight is overdue. Aural almost smiles, then turns another page of fire.',kind:'You promise to carry one story upward, even if it hurts to remember.'},spareAt:4,mercyText:'Aural lowers the burning index. A road opens between the shelves.',killText:'Aural burns cold. The library forgets the sound of pages turning.'},serel_boss:{name:'Serel, Gentle Shield',face:'serel',maxHp:44,atk:7,pattern:'shards',boss:true,major:true,intro:'Serel steps between you and the village. Their sword is still sheathed.',actLines:{observe:'Serel has protected everyone for so long that they forgot protection can include themselves.',joke:'You offer to fight using compliments only. Serel blinks, then almost laughs.',kind:'You tell Serel that trust is not the opposite of caution. It is caution with a door.'},spareAt:4,mercyText:'Serel lets the sword remain unnecessary.',killText:'Serel falls without drawing the blade.'},valis_mercy:{name:'Valis, Keeper of the Last Door',face:'valis',maxHp:70,atk:8,pattern:'heart',boss:true,final:true,major:true,intro:'Valis stands inside the Heart Core, holding the locked stair like a wound.',actLines:{observe:'Valis is not trying to trap you. Valis is terrified that opening the door will let the Below be forgotten again.',joke:'You say doors are just walls with stage fright. Valis covers a laugh like it is a crime.',kind:'You offer Valis your memories of everyone you spared. The Core beats softer.'},spareAt:5,mercyText:'Valis is ready to unlock the hurt.',killText:'The Last Door opens, but no one follows you through it.'},valis_neutral:{name:'Valis of Ash and Echo',face:'valis',maxHp:80,atk:9,pattern:'heart',boss:true,final:true,major:true,intro:'Valis watches the spaces where some voices should be. The Core ticks unevenly.',actLines:{observe:'Valis sees both your kindness and the empty places it could not reach.',joke:'You try to joke. Valis says, gently, “Not every silence can be rescued by laughter.”',kind:'You admit the harm and the help. Valis listens for whether regret can become action.'},spareAt:6,mercyText:'Valis cannot forgive everything, but can still open a path.',killText:'The Core cracks into several endings at once.'},valis_violent:{name:'Hollow Valis',face:'valis',maxHp:92,atk:11,pattern:'violent',boss:true,final:true,major:true,intro:'Hollow Valis arrives without footsteps. The Heart Core has stopped trying to sound alive.',actLines:{observe:'There is grief here, but it has been sharpened until it can no longer recognize itself.',joke:'Your joke falls flat. Even the echo refuses to repeat it.',kind:'You reach out. Hollow Valis looks at the hand and counts who is missing.'},spareAt:99,mercyText:'Hollow Valis cannot hear mercy over the silence.',killText:'The last heart below becomes quiet enough for the surface.'}};
function spawnEnemy(id){const e=clone(enemies[id]);e.id=id;e.hp=e.maxHp;e.spare=false;e.mercy=0;return e}function startBattle(id,forced=false){const e=spawnEnemy(id);battle={enemy:e,phase:'intro',msg:e.intro,menu:['Fight','Act','Item','Run','Mercy'],menuIndex:0,actIndex:0,itemIndex:0,box:{x:140,y:150,w:200,h:112},soul:{x:240,y:206,r:4,inv:0},bullets:[],attackTime:0,attackDuration:e.boss||e.final?520:380,fightBar:0,fightDir:1,forced,turn:0};state.screen='battle';sfx('encounter');startMusic(e.final?'final':'battle')}
function endBattle(result){const e=battle.enemy;if(result==='spare'){state.spares++;if(e.id==='serel_boss'){setFlag('serel_spared');state.friendship.serel+=2}if(e.id==='bookwisp_boss'){setFlag('library_boss_done');state.friendship.mira++;addJournal('aural_story','Aural’s Promise','Aural gave you one surviving sentence: “We are not gone while carried.”')}if(e.final){setFlag('final_done');showEnding('spare');return}openDialogue([{name:e.name,face:e.face,text:e.mercyText}],'field')}else if(result==='kill'){state.kills++;if(e.major||e.boss||e.final)state.majorKills++;if(e.id==='bookwisp_boss'){setFlag('library_boss_done');addJournal('ash_silence','The Silent Shelf','The road opened, but the books no longer lean toward your footsteps.')}if(e.id==='serel_boss')setFlag('serel_killed');if(e.final){setFlag('final_done');showEnding('kill');return}openDialogue([{name:e.name,face:e.face,text:e.killText}],'field')}else openDialogue([{name:'Narration',face:'player',text:'You ran. The echo of your footsteps sounded like a question.'}],'field');battle=null;state.encounterGrace=240;startMusic(state.area)}
function showEnding(method){battle=null;state.screen='ending';startMusic('ending');const r=routeName();let title,lines;if(r==='mercy'&&method==='spare'){title='Mercy Ending — The Stair That Sang';lines=['Valis unlocks the Last Door with hands that tremble, but do not let go.','Mira confesses that she sealed the Below after humans forgot their promises. You carry her apology upward, and for the first time it has somewhere to land.','Pip starts a surface comedy tour for audiences of three and one suspicious pigeon. Kestrel sends letters written on repaired glass. Serel teaches the village that shields can become windows.','The world below remains strange, sad, funny, and alive. Because you chose to listen when it would have been easier to win.']}else if(r==='violent'||method==='kill'){title='Violent Ending — A Door Without Voices';lines=['The Last Door opens because nothing remains strong enough to hold it shut.','You climb back to the surface with victory in your hands and silence in your pockets. No one follows. No one waves goodbye.','Above, the rain has stopped. It should feel peaceful. It does not.','Somewhere below, a bell tries to ring and remembers it has no reason.']}else{title='Neutral Ending — The Cracked Morning';lines=['Valis opens a narrow road. Not everyone can walk it. Not everyone wants to.','The people you helped remember you warmly. The spaces left by harm remember you too.','Mira says change is not a clean page. It is a page with corrections written in honest ink.','You return to the surface carrying both light and ash. What happens next depends on what you do with the weight.']}state.endingSeen={title,lines,r};localStorage.setItem(SAVE_KEY+'_ending',JSON.stringify(state.endingSeen))}
function handleBattleInput(){if(!battle)return;if(battle.phase==='intro'||battle.phase==='message'){if(consume('Enter')||consume('KeyE')){if(battle.enemy.hp<=0)endBattle('kill');else battle.phase='menu';sfx('select')}return}if(battle.phase==='menu'){if(consume('ArrowLeft')||consume('KeyA')){battle.menuIndex=(battle.menuIndex+battle.menu.length-1)%battle.menu.length;sfx('blip')}if(consume('ArrowRight')||consume('KeyD')){battle.menuIndex=(battle.menuIndex+1)%battle.menu.length;sfx('blip')}if(consume('Enter')||consume('KeyE')){const opt=battle.menu[battle.menuIndex];sfx('select');if(opt==='Fight'){battle.phase='fight';battle.fightBar=0;battle.fightDir=1;battle.msg='Strike when the line is close to the center.'}if(opt==='Act'){battle.phase='act';battle.actIndex=0}if(opt==='Item'){battle.phase='item';battle.itemIndex=0}if(opt==='Run')doRun();if(opt==='Mercy')doMercy()}return}if(battle.phase==='act'){const acts=['Observe','Joke','Kindness'];if(consume('ArrowUp')||consume('KeyW')){battle.actIndex=(battle.actIndex+acts.length-1)%acts.length;sfx('blip')}if(consume('ArrowDown')||consume('KeyS')){battle.actIndex=(battle.actIndex+1)%acts.length;sfx('blip')}if(consume('Escape')||consume('KeyX'))battle.phase='menu';if(consume('Enter')||consume('KeyE'))doAct(acts[battle.actIndex].toLowerCase());return}if(battle.phase==='item'){const ids=Object.keys(state.inventory);if(!ids.length){if(consume('Enter')||consume('KeyE')||consume('Escape')||consume('KeyX'))battle.phase='menu';return}if(consume('ArrowUp')||consume('KeyW')){battle.itemIndex=(battle.itemIndex+ids.length-1)%ids.length;sfx('blip')}if(consume('ArrowDown')||consume('KeyS')){battle.itemIndex=(battle.itemIndex+1)%ids.length;sfx('blip')}if(consume('Escape')||consume('KeyX'))battle.phase='menu';if(consume('Enter')||consume('KeyE'))doItem(ids[battle.itemIndex]);return}if(battle.phase==='fight'&&(consume('Enter')||consume('KeyE')))finishFight()}
function doAct(k){const e=battle.enemy,line=e.actLines[k==='kindness'?'kind':k]||'Nothing happened.';e.mercy+=k==='kindness'?2:1;if(k==='observe')addJournal('enemy_'+e.id,e.name,line);if(e.id==='valis_violent')e.mercy=Math.min(e.mercy,2);if(e.mercy>=e.spareAt)e.spare=true;battle.msg=line+(e.spare?' '+e.name+' can be spared.':'');battle.phase='message_then_attack';sfx(k==='joke'?'joke':'talk')}function doItem(id){const it=items[id];heal(it.heal);removeItem(id);battle.msg='You used '+it.name+'. '+it.desc;battle.phase='message_then_attack';sfx('heal')}function doRun(){const e=battle.enemy;if(e.boss||e.final||battle.forced){battle.msg='The way out is listening, but it will not open during this fight.';battle.phase='message_then_attack'}else if(Math.random()<.65)endBattle('run');else{battle.msg='You tried to run. Your feet filed a complaint and stayed.';battle.phase='message_then_attack'}}function doMercy(){if(battle.enemy.spare)endBattle('spare');else{battle.msg=battle.enemy.name+' is not ready for mercy yet.';battle.phase='message_then_attack'}}function finishFight(){const e=battle.enemy,dist=Math.abs(battle.fightBar-100),dmg=Math.max(3,Math.round(16-dist/7));e.hp-=dmg;e.spare=false;battle.msg='You dealt '+dmg+' damage.'+(e.hp<=0?' The choice echoes sharply.':'');battle.phase=e.hp<=0?'message':'message_then_attack';sfx('hit')}function beginAttack(){battle.phase='attack';battle.attackTime=0;battle.bullets=[];battle.soul.x=battle.box.x+battle.box.w/2;battle.soul.y=battle.box.y+battle.box.h/2;battle.turn++}function endAttack(){if(state.hp<=0){state.screen='gameover';startMusic('gameover');return}battle.msg=battle.enemy.spare?battle.enemy.name+' does not want to hurt you anymore.':choice([battle.enemy.name+' takes a shaky breath.','The air buzzes with old feelings.',battle.enemy.name+' watches what you will choose next.']);battle.phase='message'}
function updateBattle(dt){handleBattleInput();if(!battle)return;if(battle.phase==='fight'){battle.fightBar+=battle.fightDir*dt*4.75;if(battle.fightBar>200){battle.fightBar=200;battle.fightDir=-1}if(battle.fightBar<0){battle.fightBar=0;battle.fightDir=1}}if(battle.phase==='message_then_attack'&&(consume('Enter')||consume('KeyE')))beginAttack();if(battle.phase==='attack')updateAttack(dt)}function hurtPlayer(n){if(battle.soul.inv>0)return;state.hp=clamp(state.hp-n,0,state.maxHp);battle.soul.inv=55;sfx('hurt')}function spawnBullet(b){battle.bullets.push(b)}
function updateAttack(dt){const b=battle.box,s=battle.soul,e=battle.enemy;tickSoul(dt,b,s);const t=battle.attackTime+=dt,turn=battle.turn;if(e.pattern==='petals'){if(Math.floor(t)%32===0)spawnBullet({type:'circle',x:rand(b.x+8,b.x+b.w-8),y:b.y-8,r:4,vx:Math.sin(t/30)*.35,vy:rand(.6,1.3),color:'#ff9ac8'});if(Math.floor(t)%85===0)spawnBullet({type:'rect',x:b.x-8,y:rand(b.y+10,b.y+b.h-10),w:10,h:3,vx:1.3,vy:0,color:'#ffc1dd'})}else if(e.pattern==='drips'){if(Math.floor(t)%28===0)spawnBullet({type:'circle',x:rand(b.x+5,b.x+b.w-5),y:b.y-5,r:3,vx:0,vy:rand(.7,1.6),color:'#7cff9b'});if(Math.floor(t+14)%70===0)spawnBullet({type:'rect',x:rand(b.x+10,b.x+b.w-20),y:b.y+b.h+4,w:6,h:12,vx:0,vy:-1,color:'#9effb3'})}else if(e.pattern==='gears'){if(Math.floor(t)%48===0)spawnBullet({type:'gear',x:turn%2?b.x-8:b.x+b.w+8,y:rand(b.y+10,b.y+b.h-10),r:7,vx:turn%2?1:-1,vy:Math.sin(t/40)*.25,color:'#ffd66b'});if(Math.floor(t+20)%100===0)spawnBullet({type:'rect',x:rand(b.x+15,b.x+b.w-15),y:b.y-8,w:4,h:18,vx:0,vy:1.15,color:'#d7ae55'})}else if(e.pattern==='shards'){if(Math.floor(t)%45===0)aimed(b,s,1.1,'#a9f9ff');if(Math.floor(t)%130===0)spawnBullet({type:'wall',x:b.x+b.w,y:b.y+16*irand(1,5),w:42,h:5,vx:-1.45,vy:0,color:'#dbf7ff'})}else if(e.pattern==='letters'||e.pattern==='bossletters'){const rate=e.pattern==='bossletters'?24:34;if(Math.floor(t)%rate===0)spawnBullet({type:'letter',ch:choice(['R','E','G','R','E','T','?','!']),x:rand(b.x+5,b.x+b.w-5),y:b.y-8,r:4,vx:rand(-.35,.35),vy:rand(.65,1.35),color:'#fff0a6'});if(e.pattern==='bossletters'&&Math.floor(t+30)%115===0)for(let i=0;i<6;i++)spawnBullet({type:'letter',ch:choice(['S','T','A','Y']),x:b.x-10,y:b.y+12+i*16,r:4,vx:1.25,vy:Math.sin((t+i)/20)*.2,color:'#ff9e7a'})}else if(e.pattern==='heart'){if(Math.floor(t)%55===0){const cx=b.x+b.w/2,cy=b.y+b.h/2;for(let i=0;i<12;i++){const a=Math.PI*2/12*i+t/100;spawnBullet({type:'circle',x:cx,y:cy,r:3.5,vx:Math.cos(a)*.85,vy:Math.sin(a)*.85,color:i%2?'#ff81b5':'#89ffe4'})}}if(Math.floor(t+10)%120===0)spawnBullet({type:'wall',x:b.x-40,y:b.y+12+16*irand(0,5),w:38,h:4,vx:1.35,vy:0,color:'#ffb5d1'})}else if(e.pattern==='violent'){if(Math.floor(t)%38===0)aimed(b,s,1.5,'#ff5d73');if(Math.floor(t)%90===0)for(let i=0;i<7;i++)spawnBullet({type:'rect',x:b.x+i*32,y:b.y-8,w:6,h:18,vx:Math.sin(i+t)*.15,vy:1.35,color:'#a47dff'})}for(const o of battle.bullets){o.x+=o.vx*dt;o.y+=o.vy*dt}battle.bullets=battle.bullets.filter(o=>o.x>b.x-60&&o.x<b.x+b.w+60&&o.y>b.y-60&&o.y<b.y+b.h+60);const sr={x:s.x-s.r,y:s.y-s.r,w:s.r*2,h:s.r*2};for(const o of battle.bullets){const br=o.type==='rect'||o.type==='wall'?{x:o.x,y:o.y,w:o.w,h:o.h}:{x:o.x-o.r,y:o.y-o.r,w:o.r*2,h:o.r*2};if(overlap(sr,br))hurtPlayer(e.atk)}if(battle.attackTime>=battle.attackDuration)endAttack()}
function tickSoul(dt,b,s){s.inv=Math.max(0,s.inv-dt);const sp=1.35;if(keys.ArrowLeft||keys.KeyA)s.x-=sp*dt;if(keys.ArrowRight||keys.KeyD)s.x+=sp*dt;if(keys.ArrowUp||keys.KeyW)s.y-=sp*dt;if(keys.ArrowDown||keys.KeyS)s.y+=sp*dt;s.x=clamp(s.x,b.x+s.r,b.x+b.w-s.r);s.y=clamp(s.y,b.y+s.r,b.y+b.h-s.r)}function aimed(b,s,spd,col){const side=irand(0,3),start=side===0?{x:rand(b.x,b.x+b.w),y:b.y-8}:side===1?{x:b.x+b.w+8,y:rand(b.y,b.y+b.h)}:side===2?{x:rand(b.x,b.x+b.w),y:b.y+b.h+8}:{x:b.x-8,y:rand(b.y,b.y+b.h)},a=Math.atan2(s.y-start.y,s.x-start.x);spawnBullet({type:'diamond',x:start.x,y:start.y,r:5,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color:col})}
function activeNPCs(){return npcs.filter(n=>n.area===state.area).filter(n=>!(n.id==='pip_clock'&&!flag('pip_met'))&&!(n.id==='pip_garden'&&flag('pip_clock_seen'))&&!(n.id==='valis_shadow'&&flag('final_done')))}function activeObjects(){return objects.filter(o=>o.area===state.area)}function solid(tx,ty){const m=maps[state.area];if(!m[ty]||m[ty][tx]===undefined)return true;return['#','h','b'].includes(m[ty][tx])}function canMoveTo(x,y){const box={x:x+3,y:y+5,w:10,h:10};for(const [cx,cy]of[[box.x,box.y],[box.x+box.w-1,box.y],[box.x,box.y+box.h-1],[box.x+box.w-1,box.y+box.h-1]])if(solid(Math.floor(cx/TILE),Math.floor(cy/TILE)))return false;for(const n of activeNPCs()){const nr={x:n.x*TILE+3,y:n.y*TILE+4,w:10,h:12};if(overlap(box,nr))return false}return true}function facingTile(){const cx=Math.floor((state.px+8)/TILE),cy=Math.floor((state.py+8)/TILE);return state.dir==='up'?{x:cx,y:cy-1}:state.dir==='down'?{x:cx,y:cy+1}:state.dir==='left'?{x:cx-1,y:cy}:{x:cx+1,y:cy}}
function tryInteract(){const ft=facingTile();for(const n of activeNPCs())if(n.x===ft.x&&n.y===ft.y){interactNPC(n);return}for(const o of activeObjects())if(o.x===ft.x&&o.y===ft.y){interactObject(o);return}const m=maps[state.area];if(m[ft.y]&&m[ft.y][ft.x]==='~')openDialogue([{name:'Water',face:'mira',text:'The water reflects someone almost like you, but kinder in the eyes.'}],'field')}
function checkWarps(){const tx=Math.floor((state.px+8)/TILE),ty=Math.floor((state.py+8)/TILE),area=areaDefs[state.area];for(const w of area.warps)if(tx>=w.x&&tx<w.x+w.w&&ty>=w.y&&ty<w.y+w.h){if(w.need&&!flag(w.need)){if(!state.toast)toast('The path is sealed by an unfinished promise.');return}state.area=w.to;state.px=w.px;state.py=w.py;state.encounterGrace=120;if(w.to==='clock')setFlag('pip_clock_seen');rebuildMaps();startMusic(state.area);sfx('door');toast(areaDefs[state.area].name);if(state.area==='village'&&!flag('village_arrived')){setFlag('village_arrived');openDialogue([{name:'Narration',face:'player',text:'The town ahead shines like a held breath. Every house is a lantern with a crack in it.'},{name:'Mira',face:'mira',text:'The Glass Village survives by being careful. Please be more than careful. Be gentle.'}],'field')}return}}
function maybeEncounter(moved){if(!moved||state.encounterGrace>0)return;const a=areaDefs[state.area];if(!a.encounters.length)return;state.steps++;if(state.steps>55&&Math.random()<.035){state.steps=0;startBattle(choice(a.encounters))}}
